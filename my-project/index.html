<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SunSafe | Dashboard</title>
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <div class="brand">☀️ UV Safety Assistant</div>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-link active">Dashboard</a></li>
                <li><a href="awareness.html" class="nav-link">UV Awareness</a></li>
                <li><a href="tools.html" class="nav-link">Protection Tools</a></li>
                <li><a href="profile.html" class="nav-link">Profile</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="location-container">
            <span class="location-badge">📍 Melbroune, VIC</span>
        </div>

        <div class="uv-main-card">
            <p class="uv-label">CURRENT UV INDEX</p>
            <div class="uv-value">9</div>
            <p class="uv-status">VERY HIGH</p>
        </div>

        <p class="uv-description">Very High UV - extra protection required. Avoid sun during peak hours.</p>
        
        <div class="risk-legend">
            <p class="legend-title">UV Risk Levels</p>
            <div class="risk-tags">
                <span class="tag low">0-2 Low</span>
                <span class="tag moderate">3-5 Moderate</span>
                <span class="tag high">6-7 High</span>
                <span class="tag very-high active">8-10 Very High</span>
                <span class="tag extreme">11+ Extreme</span>
            </div>
        </div>
    </div>
    <script src="/src/script.js"></script>
</body>
</html>
